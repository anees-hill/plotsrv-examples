table-settings:
  table_view_mode: rich
  max_table_rows_simple: 200
  max_table_rows_rich: inf

ui-settings:
  default:
    header_text: "REDIRECTED CONFIG: default name"
  instances:
    smoke:
      header_text: "REDIRECTED CONFIG: NAMED name"
      favicon: "www/free-png1.png"
      page_title: "The Test App 1"
      logo: "www/free-png.png"

render-settings:
  default:
    plot_dpi: 200
    plot_default_figsize_in: "12,6"
    plot_bbox_tight: true
    plot_pad_inches: 0.10

view-order-settings:
  sections: [static-files]
  labels:
    plotnine: ["MEM-USED", "CPU%%"]

truncation:
  default:
      text: 55000
      html: 100
      markdown: off

# Disk Storage ----------
# No storage
# storage-settings:
#   enabled: false

# 2 max storage
storage-settings:
  enabled: true
  root_dir: .plotsrv/store
  default_keep_last: 2
  max_snapshot_size_mb: 20

