artifact-render-settings:
  html_sanitize: false

render-settings:
  default:
    plot_dpi: 200
    plot_default_figsize_in: "12,6"
    plot_bbox_tight: true
    plot_pad_inches: 0.10

view-order-settings:
  sections: [static-files]
  labels:
    plotnine: ["MEM-USED", "CPU%%"]

truncation:
  default:
      text: 55000
      html: off
      markdown: off

# Disk Storage ----------
# No storage
# storage-settings:
#   enabled: false

# 2 max storage
storage-settings:
  enabled: true
  root_dir: .plotsrv/store
  default_keep_last: 2
  max_snapshot_size_mb: 20

# Time-limited storage
# storage-settings:
#   enabled: true
#   root_dir: .plotsrv/store
#   default_keep_last: 10
#   default_min_store_interval: 1h

# Freshness -------------
freshness-settings:
  enabled: true
  expected_every: 60s
  warn_after: 90s
  error_after: 180s