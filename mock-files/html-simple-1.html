<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Example Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    header {
      background: #1e88e5;
      color: white;
      padding: 1rem 2rem;
    }

    main {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
      background: white;
    }

    h1 {
      margin-top: 0;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
    }

    button {
      background: #1e88e5;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #1565c0;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Simple HTML Page</h1>
  </header>

  <main>
    <section class="card">
      <h2>Welcome</h2>
      <p>This is a very simple HTML page with a bit of structure and styling.</p>
    </section>

    <section class="card">
      <h2>Things to do</h2>
      <ul>
        <li>Read this example</li>
        <li>Modify the text</li>
        <li>Add your own sections</li>
      </ul>
      <button onclick="alert('Button clicked!')">Click me</button>
    </section>
  </main>

  <footer>
    &copy; 2026 Example Site
  </footer>
</body>
</html>
